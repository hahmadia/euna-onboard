# ── asdf Plugins ────────────────────────────────────────────────────
# format: "plugin_name"
ASDF_PLUGINS=(
  ruby
  nodejs
  erlang
  elixir
)

# ── Platforms requiring access ──────────────────────────────────────
# format: "id:display_name:check_command:ticket_resource"
# Most access is self-service (SSO via the M365 apps portal or a direct
# login) — Phase 1 prints guidance and asks you to confirm. `gh_org_check`
# and `aws_check` auto-confirm if the CLI is already authenticated; the rest
# use `browser_check` (manual confirmation). IT tickets are a fallback only.
PLATFORMS=(
  "github_cb:GitHub (CityBaseInc):gh_org_check CityBaseInc:GitHub CityBaseInc org"
  "github_pay:GitHub (Payments-CityBase):gh_org_check Payments-CityBase:GitHub Payments-CityBase org"
  "aws_iam:AWS IAM:aws_check:AWS IAM Identity Center (Payments Production)"
  "vpn:AWS VPN:browser_check:VPN Access"
  "gemfury:GemFury:browser_check:GemFury access"
  "npm_org:NPM Org:browser_check:NPM @thecb org membership"
  "onepassword:1Password:browser_check:1Password Citybase - Technology vault"
  "jira:JIRA:browser_check:JIRA access"
  "coralogix:Coralogix:browser_check:Coralogix-Payments access"
  "airbrake:Airbrake:browser_check:Airbrake access"
  "sisense:Sisense (Periscope):browser_check:Sisense/Periscope access"
)

