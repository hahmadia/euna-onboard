  ruby
  nodejs
  erlang
  elixir
)

# ── Platforms requiring access ──────────────────────────────────────
# format: "id:display_name:ticket_resource:access_type"
# access_type drives Phase 1: self_service prints guidance and asks you to
# confirm (IT ticket as a fallback); it_ticket assumes no access on the first
# run, opens a pre-filled IT ticket, and only asks on later runs.
PLATFORMS=(
  "github_cb:GitHub (CityBaseInc):GitHub CityBaseInc org:self_service"
  "github_pay:GitHub (Payments-CityBase):GitHub Payments-CityBase org:self_service"
  "aws_iam:AWS IAM:AWS IAM Identity Center (Payments Production):self_service"
  "vpn:AWS VPN:VPN Access:it_ticket"
  "gemfury:GemFury:GemFury access:it_ticket"
  "npm_org:NPM Org:NPM @thecb org membership:it_ticket"
  "onepassword:1Password:1Password Citybase - Technology vault:it_ticket"
  "jira:JIRA:JIRA access:self_service"
  "coralogix:Coralogix:Coralogix-Payments access:self_service"
  "airbrake:Airbrake:Airbrake access:self_service"
  "sisense:Sisense (Periscope):Sisense/Periscope access:it_ticket"
)

